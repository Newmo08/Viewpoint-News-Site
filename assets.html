<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Personal</title>
	<link rel="stylesheet" href="main.css" />
</head>

<header>
	<aside>
		<img src="">
	</aside>
	<button id="reset-btn" class="reset-btn">Reset Game</button>
</header>

<body>
	<div class="app">
		<div class="menu-toggle">
			<div class="hamburger">
				<span></span>
			</div>
		</div>

		<aside class="sidebar">
			<h2>Wallet</h2>
			<nav class="wallet">
   	            <ul>
					<li><strong>Bank Balance</strong></li>
					<li>Current money: <strong id="balance">$0</strong></li>
					<li>Total assets owned: <strong id="owned-assets">0</strong></li>
					<li>Total speed: <strong id="speed">0</strong> / sec</li>
				</ul>
			</nav>
			<nav class="menu">
				<a href="index.html" class="menu-item">Store</a>
				<a href="assets.html" class="menu-item is-active">Assets</a>
				<a href="items.html" class="menu-item">Items</a>
			</nav>
		</aside>

		<main class="content">
			<h1>
				Assets
			</h1>


		<section class="store">
			<h2>Your Assets</h2>
			<div id="asset-list">
				<p>No assets owned yet.</p>
			</div>
		</section>

		<section class="store">
			<h2>Your Collectibles</h2>
			<div id="collectible-list">
				<p>No collectibles owned yet.</p>
			</div>
		</section>

	</main>
	</div>

	<script>
		const menu_toggle = document.querySelector('.menu-toggle');
		const sidebar = document.querySelector('.sidebar');

		menu_toggle.addEventListener('click', () => {
			menu_toggle.classList.toggle('is-active');
			sidebar.classList.toggle('is-active');
		});

		const items = {
			deli: { name: 'Deli', speed: 1, cost: 20, group: 'Groceries' },
			cornerStore: { name: 'Corner Store', speed: 4, cost: 70, group: 'Groceries' },
			supermarket: { name: 'Supermarket', speed: 12, cost: 180, group: 'Groceries' },
			hypermarket: { name: 'Hypermarket', speed: 24, cost: 300, group: 'Groceries' },
			shoppingCenter: { name: 'Shopping Center', speed: 5, cost: 100, group: 'Retail & Entertainment' },
			mall: { name: 'Mall', speed: 20, cost: 360, group: 'Retail & Entertainment' },
			carDealer: { name: 'Car Dealer', speed: 45, cost: 800, group: 'Retail & Entertainment' },
			entertainmentComplex: { name: 'Entertainment Complex', speed: 90, cost: 1800, group: 'Retail & Entertainment' },
			apartmentBlock: { name: 'Apartment Block', speed: 160, cost: 3200, group: 'Apartments' },
			highriseComplex: { name: 'High-rise Complex', speed: 420, cost: 7600, group: 'Apartments' },
			sportsClub: { name: 'Sports Club', speed: 1000, cost: 20000, group: 'Sports Clubs' },
			stadium: { name: 'Stadium', speed: 2600, cost: 52000, group: 'Sports Clubs' }
		};

		let balance = Number(localStorage.getItem('balance') || 50);
		let ownedAssets = JSON.parse(localStorage.getItem('ownedAssets') || '{}');
		let ownedItems = JSON.parse(localStorage.getItem('ownedItems') || '{}');

		const balanceEl = document.getElementById('balance');
		const ownedEl = document.getElementById('owned-assets');
		const speedEl = document.getElementById('speed');
		const assetListEl = document.getElementById('asset-list');
		const collectibleListEl = document.getElementById('collectible-list');
		const purchaseButtons = document.querySelectorAll('[data-item]');

		function saveState() {
			localStorage.setItem('balance', balance);
			localStorage.setItem('ownedAssets', JSON.stringify(ownedAssets));
		}

		function formatNumber(value) {
			if (value >= 1000000) {
				return (value / 1000000).toFixed(1).replace(/\.0$/, '') + 'm';
			}
			if (value >= 1000) {
				return (value / 1000).toFixed(1).replace(/\.0$/, '') + 'k';
			}
			return value.toFixed(0);
		}

		function itemCount(itemKey) {
			return ownedAssets[itemKey] || 0;
		}

		function totalAssets() {
			return Object.values(ownedAssets).reduce((sum, count) => sum + count, 0);
		}

		function totalSpeed() {
			return Object.entries(ownedAssets).reduce((sum, [key, count]) => {
				const item = items[key];
				return sum + (item ? item.speed * count : 0);
			}, 0);
		}

		function updateButtonStates() {
			purchaseButtons.forEach(button => {
				const item = items[button.dataset.item];
				button.disabled = balance < item.cost;
			});
		}

		function sellItem(itemKey) {
			const item = items[itemKey];
			if (!item || itemCount(itemKey) <= 0) return;
			const sellPrice = Math.floor(item.cost * 0.5);
			balance += sellPrice;
			ownedAssets[itemKey] = itemCount(itemKey) - 1;
			updateDisplay();
		}

		function renderAssets() {
			const owned = Object.entries(ownedAssets).filter(([, count]) => count > 0);
			if (owned.length === 0) {
				assetListEl.innerHTML = '<p>No assets owned yet.</p>';
				return;
			}
			const grouped = owned.reduce((acc, [key, count]) => {
				const item = items[key];
				const group = item?.group || 'Other';
				if (!acc[group]) acc[group] = [];
				acc[group].push({ key, item, count });
				return acc;
			}, {});
			const groupHtml = Object.entries(grouped).map(([group, entries]) => {
				const rows = entries.map(({ key, item, count }) => {
					const sellPrice = Math.floor(item.cost * 0.5);
					return `
						<div class="asset-row">
							<div class="asset-info">
								<strong>${item.name}</strong>: ${count} × ${item.speed} / sec = ${formatNumber(item.speed * count)} / sec
							</div>
							<button class="sell-btn" onclick="window.sellItem('${key}')">Sell ($${sellPrice})</button>
						</div>`;
				}).join('');
				return `
					<div class="asset-group">
						<h3>${group}</h3>
						${rows}
					</div>`;
			}).join('');
			assetListEl.innerHTML = groupHtml;
		}

		const collectibles = {
			motorbike: { name: 'Motorbike' },
			house: { name: 'House' },
			lamborghini: { name: 'Lamborghini' },
			mansion: { name: 'Mansion' },
			monaLisa: { name: 'Mona Lisa' }
		};

		window.sellItem = sellItem;

		function renderCollectibles() {
			const owned = Object.entries(ownedItems).filter(([, count]) => count > 0);
			if (owned.length === 0) {
				collectibleListEl.innerHTML = '<p>No collectibles owned yet.</p>';
				return;
			}
			collectibleListEl.innerHTML = owned.map(([key, count]) => {
				const item = collectibles[key];
				return item ? `
					<div class="asset-row">
						<div class="asset-info"><strong>${item.name}</strong>: ${count} owned</div>
					</div>` : '';
			}).join('');
		}

		function updateDisplay() {
			balanceEl.textContent = '$' + formatNumber(balance);
			ownedEl.textContent = totalAssets();
			speedEl.textContent = formatNumber(totalSpeed());
			renderAssets();
			renderCollectibles();
			saveState();
			updateButtonStates();
		}

		function buyItem(itemKey) {
			const item = items[itemKey];
			if (!item) return;
			if (balance < item.cost) {
				alert('Not enough money to buy this item.');
				return;
			}
			balance -= item.cost;
			ownedAssets[itemKey] = itemCount(itemKey) + 1;
			updateDisplay();
		}

		purchaseButtons.forEach(button => {
			button.addEventListener('click', () => {
				buyItem(button.dataset.item);
			});
		});

		window.buyItem = buyItem;

		setInterval(() => {
			balance += totalSpeed();
			updateDisplay();
		}, 1000);

		window.addEventListener('storage', (event) => {
			if (event.key === 'ownedAssets') {
				ownedAssets = JSON.parse(event.newValue || '{}');
				updateDisplay();
			}
			if (event.key === 'ownedItems') {
				ownedItems = JSON.parse(event.newValue || '{}');
				updateDisplay();
			}
			if (event.key === 'balance') {
				balance = Number(event.newValue || balance);
				updateDisplay();
			}
		});

		updateDisplay();

		function resetGame() {
			if (confirm('Are you sure you want to reset your progress? This cannot be undone.')) {
				balance = 50;
				ownedAssets = {};
				updateDisplay();
			}
		}

		document.getElementById('reset-btn').addEventListener('click', resetGame);
	</script>
	
</body>
</html>
