<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Personal</title>
	<link rel="stylesheet" href="main.css" />
</head>

<header>
	<button id="reset-btn" class="reset-btn">Reset Game</button>
	<aside>
		<img src="">
	</aside>
</header>

<body>
	<div class="app">
		<div class="menu-toggle">
			<div class="hamburger">
				<span></span>
			</div>
		</div>

		<aside class="sidebar">
			<h2>Wallet</h2>
			<nav class="wallet">
   	            <ul>
					<li><strong>Bank Balance</strong></li>
					<li>Current money: <strong id="balance">$0</strong></li>
					<li>Total assets owned: <strong id="owned-assets">0</strong></li>
					<li>Total speed: <strong id="speed">0</strong> / sec</li>
				</ul>
			</nav>
			<nav class="menu">
				<a href="index.html" class="menu-item is-active">Store</a>
				<a href="assets.html" class="menu-item">Assets</a>
				<a href="items.html" class="menu-item">Items</a>
			</nav>
		</aside>

		<main class="content">
			<h1>
				Build Your<br>
				Empire
			</h1>

		<p class="Subtext">
			Buy and sell businesses<br>
			Make money<br>
			Own the world
		</p>

		<section class="store">
			<p>Buy an asset:</p>
			<div class="store-group">
				<h3>Groceries</h3>
				<div class="equip-buttons">
					<button data-item="deli">Deli (+1 / sec) — $50</button>
					<button data-item="cornerStore">Corner Store (+4 / sec) — $225</button>
					<button data-item="supermarket">Supermarket (+12 / sec) — $500</button>
					<button data-item="hypermarket">Hypermarket (+24 / sec) — $650</button>
				</div>
			</div>
			<div class="store-group">
				<h3>Retail & Entertainment</h3>
				<div class="equip-buttons">
					<button data-item="shoppingCenter">Shopping Center (+30 / sec) — $825</button>
					<button data-item="mall">Mall (+38 / sec) — $1,000</button>
					<button data-item="carDealer">Car Dealer (+45 / sec) — $1,150</button>
					<button data-item="entertainmentComplex">Entertainment Complex (+90 / sec) — $1,800</button>
				</div>
			</div>
			<div class="store-group">
				<h3>Apartments</h3>
				<div class="equip-buttons">
					<button data-item="apartmentBlock">Apartment Block (+160 / sec) — $3,200</button>
					<button data-item="highriseComplex">High-rise Complex (+420 / sec) — $7,600</button>
				</div>
			</div>
			<div class="store-group">
				<h3>Sports Clubs</h3>
				<div class="equip-buttons">
					<button data-item="sportsClub">Sports Club (+1,000 / sec) — $35,000</button>
					<button data-item="stadium">Stadium (+2,600 / sec) — $70,000</button>
				</div>
			</div>
		</section>
	</main>
	</div>

	<script>
		const menu_toggle = document.querySelector('.menu-toggle');
		const sidebar = document.querySelector('.sidebar');

		menu_toggle.addEventListener('click', () => {
			menu_toggle.classList.toggle('is-active');
			sidebar.classList.toggle('is-active');
		});

		const items = {
			deli: { name: 'Deli', speed: 1, cost: 20, group: 'Groceries' },
			deli: { name: 'Deli', speed: 1, cost: 50, group: 'Groceries' },
			cornerStore: { name: 'Corner Store', speed: 4, cost: 225, group: 'Groceries' },
			supermarket: { name: 'Supermarket', speed: 12, cost: 500, group: 'Groceries' },
			hypermarket: { name: 'Hypermarket', speed: 24, cost: 650, group: 'Groceries' },
			shoppingCenter: { name: 'Shopping Center', speed: 30, cost: 825, group: 'Retail & Entertainment' },
			mall: { name: 'Mall', speed: 38, cost: 1000, group: 'Retail & Entertainment' },
			carDealer: { name: 'Car Dealer', speed: 45, cost: 1150, group: 'Retail & Entertainment' },
			entertainmentComplex: { name: 'Entertainment Complex', speed: 90, cost: 1800, group: 'Retail & Entertainment' },
			apartmentBlock: { name: 'Apartment Block', speed: 160, cost: 3200, group: 'Apartments' },
			highriseComplex: { name: 'High-rise Complex', speed: 420, cost: 11250, group: 'Apartments' },
			sportsClub: { name: 'Sports Club', speed: 1000, cost: 35000, group: 'Sports Clubs' },
			stadium: { name: 'Stadium', speed: 2600, cost: 70000, group: 'Sports Clubs' }
		};

		let balance = Number(localStorage.getItem('balance') || 50);
		let ownedAssets = JSON.parse(localStorage.getItem('ownedAssets') || '{}');

		const balanceEl = document.getElementById('balance');
		const ownedEl = document.getElementById('owned-assets');
		const speedEl = document.getElementById('speed');
		const purchaseButtons = document.querySelectorAll('[data-item]');

		function saveState() {
			localStorage.setItem('balance', balance);
			localStorage.setItem('ownedAssets', JSON.stringify(ownedAssets));
		}

		function formatNumber(value) {
			if (value >= 1000000) {
				return (value / 1000000).toFixed(1).replace(/\.0$/, '') + 'm';
			}
			if (value >= 1000) {
				return (value / 1000).toFixed(1).replace(/\.0$/, '') + 'k';
			}
			return value.toFixed(0);
		}

		function itemCount(itemKey) {
			return ownedAssets[itemKey] || 0;
		}

		function totalAssets() {
			return Object.values(ownedAssets).reduce((sum, count) => sum + count, 0);
		}

		function totalSpeed() {
			return Object.entries(ownedAssets).reduce((sum, [key, count]) => {
				const item = items[key];
				return sum + (item ? item.speed * count : 0);
			}, 0);
		}

		function updateButtonStates() {
			purchaseButtons.forEach(button => {
				const item = items[button.dataset.item];
				button.disabled = balance < item.cost;
			});
		}

		function updateDisplay() {
			balanceEl.textContent = '$' + formatNumber(balance);
			ownedEl.textContent = totalAssets();
			speedEl.textContent = formatNumber(totalSpeed());
			saveState();
			updateButtonStates();
		}

		function buyItem(itemKey) {
			const item = items[itemKey];
			if (!item) return;
			if (balance < item.cost) {
				alert('Not enough money to buy this item.');
				return;
			}
			balance -= item.cost;
			ownedAssets[itemKey] = itemCount(itemKey) + 1;
			updateDisplay();
		}

		purchaseButtons.forEach(button => {
			button.addEventListener('click', () => {
				buyItem(button.dataset.item);
			});
		});

		setInterval(() => {
			balance += totalSpeed();
			updateDisplay();
		}, 1000);

		window.addEventListener('storage', (event) => {
			if (event.key === 'ownedAssets') {
				ownedAssets = JSON.parse(event.newValue || '{}');
				updateDisplay();
			}
			if (event.key === 'balance') {
				balance = Number(event.newValue || balance);
				updateDisplay();
			}
		});

		updateDisplay();

		function resetGame() {
			if (confirm('Are you sure you want to reset your progress? This cannot be undone.')) {
				balance = 50;
				ownedAssets = {};
				updateDisplay();
			}
		}

		document.getElementById('reset-btn').addEventListener('click', resetGame);
	</script>
	
</body>
</html>
